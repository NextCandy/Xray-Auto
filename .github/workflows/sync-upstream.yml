name: Auto Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *' # 每天午夜运行一次同步
  workflow_dispatch: # 允许用户在页面上手动点击触发

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Sync with upstream
        run: |
          gh repo sync $GITHUB_REPOSITORY --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
